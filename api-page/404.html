<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --accent: #00ffe0;
            --accent2: #ff003c;
            --text: #c8d6e5;
            --dim: #3d4f61;
        }

        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
        }

        /* Grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,255,224,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,224,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* Scanlines */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.15) 2px,
                rgba(0,0,0,0.15) 4px
            );
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
        }

        /* Glitch 404 */
        .glitch-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 0.5rem;
        }

        .num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(8rem, 22vw, 18rem);
            color: var(--accent);
            line-height: 1;
            letter-spacing: 0.05em;
            text-shadow:
                0 0 30px rgba(0,255,224,0.5),
                0 0 80px rgba(0,255,224,0.2);
            position: relative;
            display: inline-block;
        }

        .num::before,
        .num::after {
            content: '404';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .num::before {
            color: var(--accent2);
            animation: glitch1 3s infinite;
            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
        }

        .num::after {
            color: #00bfff;
            animation: glitch2 3s infinite;
            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
        }

        @keyframes glitch1 {
            0%, 90%, 100% { transform: translate(0); opacity: 0; }
            92% { transform: translate(-4px, 2px); opacity: 0.8; }
            94% { transform: translate(4px, -2px); opacity: 0.8; }
            96% { transform: translate(-2px, 0); opacity: 0.8; }
            98% { transform: translate(0); opacity: 0; }
        }

        @keyframes glitch2 {
            0%, 88%, 100% { transform: translate(0); opacity: 0; }
            90% { transform: translate(4px, 3px); opacity: 0.7; }
            92% { transform: translate(-3px, -1px); opacity: 0.7; }
            94% { transform: translate(2px, 0); opacity: 0.7; }
            96% { transform: translate(0); opacity: 0; }
        }

        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin: 0.8rem auto;
            max-width: 400px;
            opacity: 0.6;
        }

        .label {
            font-size: 0.65rem;
            color: var(--dim);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 0.4rem;
            animation: fadeIn 1s ease 0.3s both;
        }

        .message {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            color: var(--text);
            letter-spacing: 0.1em;
            animation: fadeIn 1s ease 0.5s both;
        }

        .message span {
            color: var(--accent);
        }

        .status-bar {
            margin-top: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            animation: fadeIn 1s ease 0.8s both;
        }

        .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent2);
            animation: blink 1.2s infinite;
        }

        .status-text {
            font-size: 0.7rem;
            color: var(--dim);
            letter-spacing: 0.2em;
        }

        .status-text em {
            color: var(--accent2);
            font-style: normal;
        }

        .btn {
            display: inline-block;
            margin-top: 2.5rem;
            padding: 0.6rem 2rem;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-decoration: none;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            transition: color 0.3s;
            animation: fadeIn 1s ease 1s both;
            cursor: pointer;
            background: transparent;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent);
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: -1;
        }

        .btn:hover {
            color: var(--bg);
        }

        .btn:hover::before {
            transform: translateX(0);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* corner decorations */
        .corner {
            position: fixed;
            width: 40px; height: 40px;
            opacity: 0.3;
        }
        .corner.tl { top: 20px; left: 20px; border-top: 1px solid var(--accent); border-left: 1px solid var(--accent); }
        .corner.tr { top: 20px; right: 20px; border-top: 1px solid var(--accent); border-right: 1px solid var(--accent); }
        .corner.bl { bottom: 20px; left: 20px; border-bottom: 1px solid var(--accent); border-left: 1px solid var(--accent); }
        .corner.br { bottom: 20px; right: 20px; border-bottom: 1px solid var(--accent); border-right: 1px solid var(--accent); }
    </style>
</head>
<body>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="container">
        <div class="label">ERROR CODE</div>
        <div class="glitch-wrap">
            <div class="num">404</div>
        </div>
        <div class="divider"></div>
        <div class="message">Page <span>Not Found</span> — Halaman tidak tersedia.</div>
        <div class="status-bar">
            <div class="dot"></div>
            <div class="status-text">STATUS: <em>DISCONNECTED</em></div>
        </div>
        <a class="btn" onclick="history.back()">← Kembali</a>
    </div>
</body>
</html>
