<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — Internal Server Error</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --accent: #ff003c;
            --accent2: #ff6b00;
            --accent3: #00ffe0;
            --text: #c8d6e5;
            --dim: #3d4f61;
        }

        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
        }

        /* Grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,0,60,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,0,60,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* Scanlines */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.15) 2px,
                rgba(0,0,0,0.15) 4px
            );
            pointer-events: none;
            z-index: 0;
        }

        /* Red danger vignette */
        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(255,0,60,0.08) 100%);
            pointer-events: none;
            z-index: 0;
            animation: pulseVignette 3s ease-in-out infinite;
        }

        @keyframes pulseVignette {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
        }

        .label {
            font-size: 0.65rem;
            color: var(--dim);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 0.4rem;
            animation: fadeIn 1s ease 0.3s both;
        }

        /* Glitch 500 */
        .glitch-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 0.5rem;
        }

        .num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(8rem, 22vw, 18rem);
            color: var(--accent);
            line-height: 1;
            letter-spacing: 0.05em;
            text-shadow:
                0 0 30px rgba(255,0,60,0.6),
                0 0 80px rgba(255,0,60,0.25);
            position: relative;
            display: inline-block;
            animation: shake 6s infinite;
        }

        .num::before,
        .num::after {
            content: '500';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .num::before {
            color: var(--accent2);
            animation: glitch1 2.5s infinite;
            clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
        }

        .num::after {
            color: var(--accent3);
            animation: glitch2 2.5s infinite;
            clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
        }

        @keyframes glitch1 {
            0%, 85%, 100% { transform: translate(0); opacity: 0; }
            87% { transform: translate(-6px, 3px); opacity: 0.9; }
            89% { transform: translate(5px, -2px); opacity: 0.9; }
            91% { transform: translate(-3px, 1px); opacity: 0.9; }
            93% { transform: translate(0); opacity: 0; }
        }

        @keyframes glitch2 {
            0%, 82%, 100% { transform: translate(0); opacity: 0; }
            84% { transform: translate(5px, 4px); opacity: 0.8; }
            86% { transform: translate(-4px, -2px); opacity: 0.8; }
            88% { transform: translate(2px, 0); opacity: 0.8; }
            90% { transform: translate(0); opacity: 0; }
        }

        @keyframes shake {
            0%, 95%, 100% { transform: translate(0); }
            96% { transform: translate(-2px, 1px); }
            97% { transform: translate(2px, -1px); }
            98% { transform: translate(-1px, 0); }
            99% { transform: translate(1px, 1px); }
        }

        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin: 0.8rem auto;
            max-width: 440px;
            opacity: 0.5;
        }

        .message {
            font-size: clamp(0.85rem, 2.5vw, 1rem);
            color: var(--text);
            letter-spacing: 0.1em;
            animation: fadeIn 1s ease 0.5s both;
        }

        .message span {
            color: var(--accent);
        }

        /* Terminal log */
        .log-box {
            margin: 1.5rem auto 0;
            max-width: 380px;
            border: 1px solid rgba(255,0,60,0.2);
            padding: 0.8rem 1rem;
            text-align: left;
            animation: fadeIn 1s ease 0.7s both;
        }

        .log-line {
            font-size: 0.65rem;
            color: var(--dim);
            letter-spacing: 0.1em;
            line-height: 1.8;
        }

        .log-line.err {
            color: var(--accent);
        }

        .log-line.warn {
            color: var(--accent2);
        }

        .cursor {
            display: inline-block;
            width: 7px;
            height: 0.7em;
            background: var(--accent);
            vertical-align: middle;
            animation: blink 1s infinite;
        }

        .status-bar {
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            animation: fadeIn 1s ease 0.9s both;
        }

        .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: blink 0.8s infinite;
        }

        .status-text {
            font-size: 0.7rem;
            color: var(--dim);
            letter-spacing: 0.2em;
        }

        .status-text em {
            color: var(--accent);
            font-style: normal;
        }

        .btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.6rem 2rem;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-decoration: none;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            transition: color 0.3s;
            animation: fadeIn 1s ease 1.1s both;
            cursor: pointer;
            background: transparent;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent);
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: -1;
        }

        .btn:hover { color: var(--bg); }
        .btn:hover::before { transform: translateX(0); }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .corner {
            position: fixed;
            width: 40px; height: 40px;
            opacity: 0.25;
        }
        .corner.tl { top: 20px; left: 20px; border-top: 1px solid var(--accent); border-left: 1px solid var(--accent); }
        .corner.tr { top: 20px; right: 20px; border-top: 1px solid var(--accent); border-right: 1px solid var(--accent); }
        .corner.bl { bottom: 20px; left: 20px; border-bottom: 1px solid var(--accent); border-left: 1px solid var(--accent); }
        .corner.br { bottom: 20px; right: 20px; border-bottom: 1px solid var(--accent); border-right: 1px solid var(--accent); }
    </style>
</head>
<body>
    <div class="vignette"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="container">
        <div class="label">ERROR CODE</div>
        <div class="glitch-wrap">
            <div class="num">500</div>
        </div>
        <div class="divider"></div>
        <div class="message">Internal Server Error — <span>Something Went Wrong.</span></div>

        <div class="log-box">
            <div class="log-line">> SYSTEM DIAGNOSTIC RUNNING...</div>
            <div class="log-line warn">> [WARN] Unexpected exception caught</div>
            <div class="log-line err">> [ERR] Server failed to process request</div>
            <div class="log-line">> [INFO] Please try again later <span class="cursor"></span></div>
        </div>

        <div class="status-bar">
            <div class="dot"></div>
            <div class="status-text">STATUS: <em>CRITICAL FAILURE</em></div>
        </div>

        <a class="btn" onclick="history.back()">← Kembali</a>
    </div>
</body>
</html>
